name: Weekly Data Update

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Update timestamp in CHANGELOG
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "" >> CHANGELOG.md
          echo "## [$DATE] - Automated Weekly Update" >> CHANGELOG.md
          echo "- Data refresh completed via GitHub Actions" >> CHANGELOG.md

      - name: Validate JSON files
        run: |
          for f in data/*.json; do
            python -c "import json; json.load(open('$f'))" && echo "Valid: $f" || echo "Invalid: $f"
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "chore: weekly data update $(date +'%Y-%m-%d')"
          git push
